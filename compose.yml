services:

# Nginx

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: personalwebsite_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/srv/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      django:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Django

  django:
    build:
      context: ./django
      dockerfile: Dockerfile
      args:
        Django_ENV: production
    container_name: personalwebsite_django
    command: sh -c "if [ ! -f /app/manage.py ]; then django-admin startproject personalwebsite /app; fi && python /app/manage.py migrate --noinput && python /app/manage.py collectstatic --noinput && gunicorn personalwebsite.wsgi:application --bind 0.0.0.0:8000 --workers 3"
#    command: /entrypoint.sh
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=personalwebsite.settings.production
      - DB_HOST=mysql
      - DB_PORT=3306
    volumes:
      - ./django/personalwebsite:/app
      - static_files:/srv/static
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

# MySQL

  mysql:
    image: mysql:8.0
    container_name: personalwebsite_mysql
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "3306"
    networks:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# Persistent Volumes

volumes:
  mysql_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/mysql_data
  static_files:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/static_files

# Networks

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
